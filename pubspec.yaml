name: userloopergen
description: UserLooperGen - Loop Pad App
publish_to: 'none'
version: 1.0.1+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Ses motoru
  just_audio: ^0.9.36
  # Dosya seçme
  file_picker: ^8.0.0
  # Supabase (auth + db + storage)
  supabase_flutter: ^2.5.0
  # ZIP (ulgm/ulbm dosyaları için)
  archive: ^3.4.10
  # Kayıt
  record: ^5.1.2
  # İzinler
  permission_handler: ^11.3.0
  # Paylaşım
  share_plus: ^9.0.0
  # Yerel depolama
  shared_preferences: ^2.2.3
  # Google fonts
  google_fonts: ^6.2.1
  # Path
  path_provider: ^2.1.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
